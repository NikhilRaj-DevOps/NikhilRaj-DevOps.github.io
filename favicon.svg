<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#080c14"/>
  <!-- DevOps infinity loop -->
  <!-- Left lobe -->
  <path d="M32 32 C28 24, 14 24, 14 32 C14 40, 28 40, 32 32Z" stroke="#00b4ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right lobe -->
  <path d="M32 32 C36 24, 50 24, 50 32 C50 40, 36 40, 32 32Z" stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow on left lobe (top) -->
  <polyline points="23,26 26,24 26,27.5" stroke="#00b4ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow on right lobe (bottom) -->
  <polyline points="41,38 38,40 38,36.5" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
